<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Service file for ALR D-Bus service -->
  
  <!-- Only root can own the service -->
  <policy user="root">
    <allow own="ru.alr-pkg.ALR"/>
    <allow send_destination="ru.alr-pkg.ALR"/>
    <allow receive_sender="ru.alr-pkg.ALR"/>
  </policy>
  
  <!-- Allow any user to call methods -->
  <policy context="default">
    <allow send_destination="ru.alr-pkg.ALR"/>
    <allow send_destination="ru.alr-pkg.ALR"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="ru.alr-pkg.ALR"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="ru.alr-pkg.ALR"
           send_interface="org.freedesktop.DBus.ObjectManager"/>
    <allow send_destination="ru.alr-pkg.ALR"
           send_interface="ru.alr-pkg.ALR.Manager"/>
    <allow send_destination="ru.alr-pkg.ALR"
           send_interface="ru.alr-pkg.ALR.Package"/>
    <allow send_destination="ru.alr-pkg.ALR"
           send_interface="ru.alr-pkg.ALR.Job"/>
    <allow receive_sender="ru.alr-pkg.ALR"/>
  </policy>
  
</busconfig>
